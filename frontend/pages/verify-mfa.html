<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify MFA</title>
  <link rel="stylesheet" href="../css/login_register.css" />
  <style>
    .otp-input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-family: monospace;
      font-size: 24px;
      text-align: center;
      letter-spacing: 8px;
    }

    .otp-input:focus {
      outline: none;
      border-color: #1d4ed8;
    }

    .recovery-link {
      display: block;
      text-align: center;
      margin-top: 14px;
      font-size: 13px;
      color: #888;
    }

    .recovery-link a {
      color: #1d4ed8;
      text-decoration: none;
    }

    /* Recovery codes box — hidden until MFA succeeds */
    .recovery-box {
      display: none;
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 8px;
      padding: 14px;
      margin-top: 16px;
    }

    .recovery-box h3 {
      font-size: 14px;
      color: #15803d;
      margin-bottom: 8px;
    }

    .recovery-box p {
      font-size: 12px;
      color: #555;
      margin-bottom: 10px;
    }

    .recovery-codes-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      list-style: none;
      padding: 0;
      margin-bottom: 10px;
    }

    .recovery-codes-list li {
      font-family: monospace;
      font-size: 13px;
      background: #fff;
      border: 1px solid #bbf7d0;
      border-radius: 6px;
      padding: 6px 10px;
      text-align: center;
      color: #15803d;
    }

    .btn-copy {
      width: 100%;
      padding: 10px;
      background: #15803d;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .btn-copy:hover {
      background: #166534;
    }

    .btn-dashboard {
      width: 100%;
      padding: 10px;
      background: #1d4ed8;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-dashboard:hover {
      background: #1e40af;
    }
  </style>
</head>
<body>
  <div class="auth-form">
    <!-- Step 1: Enter code -->
    <div id="verify-section">
      <h2>🔑 Enter Your Code</h2>

      <p style="text-align:center; font-size:14px; color:#555; margin-bottom:16px;">
        Open your Authenticator app and enter the 6-digit code.
      </p>

      <input
        type="text"
        id="totp-code"
        class="otp-input"
        maxlength="6"
        placeholder="000000"
        inputmode="numeric"
        autocomplete="one-time-code"
      />

      <button type="button" id="btn-verify">Verify</button>

      <p class="message" id="message"></p>

      <span class="recovery-link">
        Lost access to your device?
        <a href="verify-recovery.html">Use a recovery code</a>
      </span>
    </div>

    <!-- Step 2: Show recovery codes (shown after successful verify) -->
    <div class="recovery-box" id="recovery-box">
      <h3>MFA Activated! Save your recovery codes.</h3>
      <p>
        Store these codes somewhere safe. Each can only be used once
        if you lose access to your authenticator app.
      </p>
      <ul class="recovery-codes-list" id="recovery-codes-list"></ul>
      <button type="button" class="btn-copy" id="btn-copy">Copy All Codes</button>
      <button type="button" class="btn-dashboard" id="btn-dashboard">Go to Dashboard</button>
    </div>
  </div>
  <script src="../js/config.js"></script>
  <script src="../js/verify-mfa.js" defer></script>
</body>
</html>
